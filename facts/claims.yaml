  statement: "Slidev 公式の PPTX export は各スライドを画像としてページ背景に配置する方式で、テキストは編集できない"
  value: "export.ts が slide.background = { data: PNG } を設定する実装"
  source_url: "https://github.com/slidevjs/slidev/blob/main/packages/slidev/node/commands/export.ts"
  source_title: "slidevjs/slidev export.ts"
  as_of: "2026-07-04"
  confidence: high
  verified_by: "manual-doc-review"
  notes: "編集可能 PPTX は scripts/slidev-editable-pptx.mjs（自作）が担う。dev server の per-slide print ビューを Chromium で実測し PptxGenJS のネイティブ図形として再構築する。思想は marp-to-editable-pptx（claim-0009）を継承。"
