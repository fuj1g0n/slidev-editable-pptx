- id: claim-0010
  statement: "PowerPoint は PPTX 埋め込みフォント（fntdata パート）を EOT 形式でのみ受理し、生の TTF は無視する"
  value: "embedTrueTypeFonts=\"1\" + embeddedFontLst + application/x-fontdata の fntdata（EOT）で全字埋め込みが成立。PowerPoint 自身の出力は EOT v2.2（MTX 圧縮）、fonteditor-core の EOT v2.1（非圧縮）も受理。LibreOffice / Google Slides は読み側で埋め込みを無視"
  source_url: "https://support.microsoft.com/en-us/office/benefits-of-embedding-custom-fonts-cb3982aa-ea76-4323-b008-86670f222dbc"
  source_title: "Microsoft Support: Benefits of embedding custom fonts（+ ECMA-376 p:embeddedFontLst、typography fonts FAQ）"
  as_of: "2026-07-03"
  confidence: high
  verified_by: "local-run"
  notes: "実 PowerPoint 16.0 で検証。TTF 生データを fntdata に入れた対照実験では埋め込みが使われず、EOT 化した場合のみ PDF 出力のフォントが埋め込み由来になった。OctoBiz / UDEV Gothic は OFL 1.1 かつ fsType=0（installable）で埋め込み再配布可。"

